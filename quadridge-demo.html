* { margin:0; padding:0; box-sizing:border-box; }

.file-switcher { display:flex; align-items:center; gap:0; padding:0 24px; background:#fff; border-bottom:1px solid var(--border); }
.file-switcher .fs-label { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; margin-right:16px; }

.file-switcher a:hover { color:var(--text-secondary); }
.file-switcher a.current { color:var(--brand); border-bottom-color:var(--brand); }

/* HEADER */
.header { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; height:60px; padding:0 40px; background:rgba(255,255,255,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }

.header-divider { width:1px; height:24px; background:var(--border-strong); }
.header-product { font-size:14px; font-weight:600; color:var(--text); letter-spacing:-0.2px; }
.header-nav { display:flex; gap:0; }
.header-nav a { padding:20px 18px; font-size:13px; font-weight:500; color:var(--text-dim); text-decoration:none; border-bottom:2px solid transparent; transition:all 0.15s; cursor:pointer; }
.header-nav a:hover { color:var(--text); }
.header-nav a.active { color:var(--brand); border-bottom-color:var(--brand); font-weight:600; }
.indicative-badge { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--amber); background:var(--amber-bg); border:1px solid var(--amber-border); padding:4px 12px; border-radius:20px; }

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.fade-in { animation:fadeIn 0.3s ease; }

.pill { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:0.02em; }
.pill-red { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }
.pill-amber { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-border); }
.pill-green { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
.pill-brand { background:var(--brand-light); color:var(--brand); border:1px solid rgba(13,148,136,0.15); }

/* CONFIDENCE DOT */
.conf-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.conf-high { background:var(--green); }
.conf-med { background:var(--amber); }
.conf-low { background:var(--red); }

#root { min-height:100vh; }

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'})},[messages]);

  function sendChat(text){
    const q=(text||input).toLowerCase().trim();
    if(!q) return;
    const newMsgs=[...messages,{role:'user',text:text||input}];
    setMessages(newMsgs);
    setInput('');
    let r=CHAT_RESPONSES.default;
    if(q.includes('absa')||q.includes('icr')||q.includes('thekwini')||q.includes('series 2024')||q.includes('securit')||q.includes('template')) r=CHAT_RESPONSES.absa;
    else if(q.includes('standard')||q.includes('infra')||q.includes('d/e')||q.includes('debt')||q.includes('equity')||q.includes('board')) r=CHAT_RESPONSES.standard;
    else if(q.includes('nedbank')||q.includes('clo')||q.includes('clean')) r=CHAT_RESPONSES.nedbank;
    else if(q.includes('deadline')||q.includes('due')||q.includes('upcoming')||q.includes('next')||q.includes('calendar')||q.includes('schedule')) r=CHAT_RESPONSES.deadline;
    else if(q.includes('breach')||q.includes('watch')||q.includes('risk')||q.includes('danger')) r=CHAT_RESPONSES.breach;
    else if(q.includes('portfolio')||q.includes('overview')||q.includes('how many')||q.includes('summary')||q.includes('total')) r=CHAT_RESPONSES.portfolio;
    else if(q.includes('time')||q.includes('fast')||q.includes('long')||q.includes('speed')||q.includes('process')) r=CHAT_RESPONSES.howlong;
    setTimeout(()=>setMessages(m=>[...m,{role:'ai',text:r}]),800);

        ),
        e('div',{style:{display:'flex',gap:8}},
          ...[{n:1,l:'Critical',c:'var(--red)',bg:'var(--red-bg)',b:'var(--red-border)'},{n:2,l:'Warning',c:'var(--amber)',bg:'var(--amber-bg)',b:'var(--amber-border)'},{n:5,l:'Clear',c:'var(--green)',bg:'var(--green-bg)',b:'var(--green-border)'}].map((s,i)=>
            e('div',{key:i,style:{background:s.bg,border:'1px solid '+s.b,borderRadius:8,padding:'8px 16px',textAlign:'center'}},
              e('div',{style:{fontSize:18,fontWeight:800,color:s.c}},s.n),
              e('div',{style:{fontSize:10,color:s.c,textTransform:'uppercase',letterSpacing:'0.05em'}},s.l),
            )
          ),
        ),
      ),
      sorted.map((c,i)=>e('div',{key:i,style:{background:'#fff',borderRadius:'var(--radius)',boxShadow:'var(--shadow-sm)',padding:'16px 24px',marginBottom:8,borderLeft:'4px solid '+(c.status==='critical'?'var(--red)':c.status==='amber'?'var(--amber)':'var(--green)'),display:'flex',alignItems:'center',justifyContent:'space-between',transition:'box-shadow 0.15s',cursor:'pointer'}},
        e('div',{style:{flex:1}},
          e('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:4}},
            e('span',{style:{fontSize:14,fontWeight:700,color:'var(--text)'}},c.entity),
            e('span',{className:pillFor(c.status),style:{fontSize:10}},c.statusLabel),
          ),
          e('div',{style:{fontSize:12,color:'var(--text-dim)',lineHeight:1.5}},c.detail),
        ),
        e('div',{style:{display:'flex',gap:24,alignItems:'center',flexShrink:0,marginLeft:24}},
          e('div',{style:{textAlign:'center'}},e('div',{style:{fontSize:16,fontWeight:700,color:'var(--text)'}},c.covenants),e('div',{style:{fontSize:9,color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'0.05em'}},'Covenants')),
          e('div',{style:{textAlign:'center'}},e('div',{style:{fontSize:16,fontWeight:700,color:'var(--text)'}},c.size),e('div',{style:{fontSize:9,color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'0.05em'}},'Size')),
          e('div',{style:{textAlign:'center',minWidth:60}},e('div',{style:{fontSize:14,fontWeight:700,color:c.urgency==='high'?'var(--red)':c.urgency==='medium'?'var(--amber)':'var(--text)'}},c.nextReport),e('div',{style:{fontSize:9,color:'var(--text-light)',textTransform:'uppercase',letterSpacing:'0.05em'}},'Next Report')),
        ),
      )),
      // Deadlines
      e('div',{style:{background:'#fff',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-md)',padding:28,marginTop:24}},
        e('h3',{style:{fontSize:16,fontWeight:700,color:'var(--text)',marginBottom:16}},'Upcoming Deadlines'),
        e('table',{style:{width:'100%',borderCollapse:'collapse'}},
          e('thead',null,e('tr',null,
            e('th',{style:{textAlign:'left',padding:'8px 12px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-light)',borderBottom:'1px solid var(--border)'}},'Entity'),
            e('th',{style:{textAlign:'left',padding:'8px 12px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-light)',borderBottom:'1px solid var(--border)'}},'Action Required'),
            e('th',{style:{textAlign:'left',padding:'8px 12px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-light)',borderBottom:'1px solid var(--border)'}},'Due'),
            e('th',{style:{textAlign:'center',padding:'8px 12px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-light)',borderBottom:'1px solid var(--border)',width:70}},'Urgency'),
          )),
          e('tbody',null,DEADLINES.map((d,i)=>
            e('tr',{key:i},
              e('td',{style:{padding:'10px 12px',fontSize:13,fontWeight:600,color:'var(--text)',borderBottom:'1px solid var(--border)'}},d.entity),
              e('td',{style:{padding:'10px 12px',fontSize:13,color:'var(--text-secondary)',borderBottom:'1px solid var(--border)'}},d.action),
              e('td',{style:{padding:'10px 12px',fontSize:13,fontWeight:600,color:'var(--text)',borderBottom:'1px solid var(--border)'}},d.due),
              e('td',{style:{padding:'10px 12px',textAlign:'center',borderBottom:'1px solid var(--border)'}},
                e('span',{className:'pill '+(d.urgency==='critical'?'pill-red':d.urgency==='high'||d.urgency==='medium'?'pill-amber':'pill-green'),style:{fontSize:10}},d.urgency)
              ),
            )
          )),
        ),
      ),
    );
  }

  // ===================== ASK AI =====================
  function AskAI(){
    return e('div',{className:'fade-in',style:{maxWidth:720,margin:'0 auto',padding:'32px 24px',display:'flex',flexDirection:'column',height:'calc(100vh - 140px)'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:8}},
        e('div',{style:{width:36,height:36,borderRadius:10,background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:14}},'Q'),
        e('div',null,
          e('div',{style:{fontSize:15,fontWeight:700,color:'var(--text)'}},'Quadridge AI'),
          e('div',{style:{display:'flex',alignItems:'center',gap:6}},e('div',{style:{width:6,height:6,borderRadius:3,background:'var(--green)',animation:'pulse 2s infinite'}}),e('span',{style:{fontSize:11,color:'var(--text-dim)'}},'Online · Full portfolio access')),
        ),
      ),
      e('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12,marginTop:8}},
        ...['What flags need my attention?','Any covenants near breach?','Upcoming deadlines?','Tell me about the Absa securitisation','Nedbank CLO status','How fast does it process documents?','Portfolio overview'].map((chip,i)=>
          e('span',{key:i,onClick:()=>sendChat(chip),style:{display:'inline-block',background:'#fff',border:'1px solid var(--border)',borderRadius:20,padding:'6px 14px',fontSize:12,color:'var(--text-secondary)',cursor:'pointer',transition:'all 0.15s',boxShadow:'var(--shadow-sm)'}},chip)
        )
      ),
      e('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:12,paddingTop:8}},
        messages.map((m,i)=>e('div',{key:i,style:{maxWidth:'85%',alignSelf:m.role==='user'?'flex-end':'flex-start',background:m.role==='user'?'var(--brand)':'#fff',color:m.role==='user'?'#fff':'var(--text-secondary)',padding:'12px 18px',borderRadius:m.role==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px',fontSize:13,lineHeight:1.7,boxShadow:'var(--shadow-sm)',whiteSpace:'pre-line'}},m.text)),
        e('div',{ref:chatEnd}),
      ),
      e('div',{style:{display:'flex',gap:8,paddingTop:12}},
        e('input',{value:input,onChange:ev=>setInput(ev.target.value),onKeyDown:ev=>{if(ev.key==='Enter')sendChat()},placeholder:'Ask about any document, entity, covenant, or deadline...',style:{flex:1,background:'#fff',border:'1px solid var(--border-strong)',borderRadius:10,padding:'12px 18px',fontSize:14,color:'var(--text)',fontFamily:'Inter,sans-serif',outline:'none',boxShadow:'var(--shadow-sm)'}}),
        e('button',{onClick:()=>sendChat(),style:{background:'var(--brand)',border:'none',borderRadius:10,padding:'12px 24px',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'Inter,sans-serif',boxShadow:'var(--shadow-sm)'}},'Send'),
      ),
    );
  }

  // ===================== RENDER =====================
  return e('div',null,
    e('div',{className:'header'},
      e('div',{className:'header-left'},
        e('div',{className:'logo-mark'},'C'),
        e('div',{className:'header-divider'}),
        e('span',{className:'header-product'},'Quadridge — Document Intelligence'),
      ),
      e('div',{className:'header-nav'},
        e('a',{className:tab==='overview'?'active':'',onClick:()=>setTab('overview')},'Overview'),
        e('a',{className:tab==='inbox'?'active':'',onClick:()=>{setTab('inbox');if(!selectedDoc)setSelectedDoc(DOCUMENTS[0]);setDocTab('summary')}},'Inbox'),
        e('a',{className:tab==='portfolio'?'active':'',onClick:()=>setTab('portfolio')},'Portfolio'),
        e('a',{className:tab==='askai'?'active':'',onClick:()=>setTab('askai')},'Ask AI'),
      ),
      e('span',{className:'indicative-badge'},'Indicative Demo'),
    ),
    tab==='overview'&&e(Overview),
    tab==='inbox'&&e(Inbox),
    tab==='portfolio'&&e(Portfolio),
    tab==='askai'&&e(AskAI),
  );
}

ReactDOM.render(e(App),document.getElementById('root'));
</script>
</body>
</html>
