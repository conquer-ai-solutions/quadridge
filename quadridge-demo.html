function StatusBadge({ status }) {
  const colors = {
    critical: { bg: 'rgba(239,68,68,0.12)', color: '#EF4444', label: 'Critical' },
    amber: { bg: 'rgba(245,158,11,0.12)', color: '#F59E0B', label: 'Warning' },
    clear: { bg: 'rgba(34,197,94,0.12)', color: '#22C55E', label: 'Clear' },
  };
  const c = colors[status] || colors.clear;
  return React.createElement('span', {
    style: { background: c.bg, color: c.color, padding: '3px 10px', borderRadius: 4, fontSize: '0.7rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em' }
  }, c.label);
}

function ConfidenceBadge({ value }) {
  const color = value >= 95 ? '#22C55E' : value >= 90 ? '#F59E0B' : '#EF4444';
  return React.createElement('span', {
    style: { color, fontWeight: 600, fontSize: '0.8rem', fontVariantNumeric: 'tabular-nums' }
  }, value + '%');
}

function PageRef({ page }) {

}
